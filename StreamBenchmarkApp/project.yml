name: StreamBenchmarkApp
options:
  bundleIdPrefix: com.atomgradient
  deploymentTarget:
    iOS: "17.0"

packages:
  mlx-swift:
    path: ../../H2OAttnScore/mlx-swift
  mlx-swift-lm:
    path: ../../H2OAttnScore/mlx-swift-lm

targets:
  StreamBenchmarkApp:
    type: application
    platform: iOS
    sources:
      - path: StreamBenchmarkApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.atomgradient.StreamBenchmarkApp
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: LURMZC2XJB
        PRODUCT_NAME: StreamBenchmarkApp
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIFileSharingEnabled: YES
        INFOPLIST_KEY_LSSupportsOpeningDocumentsInPlace: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        CODE_SIGN_ENTITLEMENTS: StreamBenchmarkApp/StreamBenchmarkApp.entitlements
    dependencies:
      - package: mlx-swift
        product: MLX
      - package: mlx-swift
        product: MLXNN
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon

schemes:
  StreamBenchmarkApp:
    build:
      targets:
        StreamBenchmarkApp: all
